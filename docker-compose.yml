services:
  # ── Hosted Checkout (PHP) ──────────────────────────────────────────
  hosted-checkout:
    build: ./hosted-checkout-example
    container_name: ghion-hosted-checkout
    ports:
      - "3001:80"
    restart: unless-stopped

  # ── Embedded Checkout (Node.js) ────────────────────────────────────
  embedded-checkout:
    build: ./embedded-checkout-example
    container_name: ghion-embedded-checkout
    ports:
      - "3002:3002"
    environment:
      - PORT=3002
    restart: unless-stopped

  # ── API-Only (Node.js) ────────────────────────────────────────────
  api-only:
    build: ./api-only-example
    container_name: ghion-api-only
    ports:
      - "3003:3003"
    environment:
      - PORT=3003
    restart: unless-stopped
